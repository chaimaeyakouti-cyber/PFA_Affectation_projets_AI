<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F8FB"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071B33"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#071B33" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0B2A45"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="70" y="52" width="1140" height="616" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>

  <text x="640" y="112" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#071B33">
    Architecture globale de l'application
  </text>
  <text x="640" y="146" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#64748B">
    Plateforme intelligente d'affectation des projets aux groupes d'etudiants
  </text>

  <!-- Frontend -->
  <g transform="translate(110 235)">
    <text x="150" y="-28" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#071B33">Frontend</text>
    <rect x="0" y="0" width="300" height="235" rx="22" fill="#E0F2FE" stroke="#BAE6FD" stroke-width="2"/>
    <rect x="50" y="45" width="200" height="118" rx="12" fill="#FFFFFF" stroke="#0891B2" stroke-width="3"/>
    <rect x="50" y="45" width="200" height="28" rx="12" fill="#071B33"/>
    <circle cx="68" cy="59" r="4" fill="#22D3EE"/>
    <circle cx="82" cy="59" r="4" fill="#14B8A6"/>
    <circle cx="96" cy="59" r="4" fill="#A5F3FC"/>
    <rect x="75" y="93" width="150" height="14" rx="7" fill="#BAE6FD"/>
    <rect x="75" y="119" width="110" height="14" rx="7" fill="#A7F3D0"/>
    <rect x="75" y="145" width="135" height="14" rx="7" fill="#BAE6FD"/>
    <text x="150" y="188" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0B2A45">React + Vite</text>
    <text x="150" y="212" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">
      <tspan x="150" dy="0">Interfaces etudiant, encadrant</tspan>
      <tspan x="150" dy="17">et coordinateur</tspan>
    </text>
  </g>

  <!-- API -->
  <g transform="translate(490 235)">
    <text x="150" y="-28" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#071B33">API REST</text>
    <rect x="0" y="0" width="300" height="235" rx="22" fill="#FFFFFF" stroke="#D8E3ED" stroke-width="2"/>
    <rect x="92" y="42" width="116" height="116" rx="18" fill="url(#navy)"/>
    <circle cx="150" cy="100" r="33" fill="none" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="150" cy="100" r="9" fill="#FFFFFF"/>
    <line x1="150" y1="49" x2="150" y2="70" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <line x1="150" y1="130" x2="150" y2="151" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <line x1="99" y1="100" x2="120" y2="100" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <line x1="180" y1="100" x2="201" y2="100" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <text x="150" y="188" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0B2A45">FastAPI</text>
    <text x="150" y="212" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">
      <tspan x="150" dy="0">Authentification, roles</tspan>
      <tspan x="150" dy="17">et endpoints metier</tspan>
    </text>
  </g>

  <!-- Backend / AI -->
  <g transform="translate(870 235)">
    <text x="150" y="-28" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#071B33">Moteur IA</text>
    <rect x="0" y="0" width="300" height="235" rx="22" fill="#E0F2FE" stroke="#BAE6FD" stroke-width="2"/>
    <circle cx="98" cy="89" r="24" fill="#0891B2"/>
    <circle cx="190" cy="65" r="24" fill="#0F766E"/>
    <circle cx="205" cy="142" r="24" fill="#22D3EE"/>
    <circle cx="112" cy="150" r="24" fill="#0B2A45"/>
    <line x1="120" y1="84" x2="168" y2="70" stroke="#071B33" stroke-width="4"/>
    <line x1="190" y1="89" x2="202" y2="118" stroke="#071B33" stroke-width="4"/>
    <line x1="181" y1="149" x2="136" y2="150" stroke="#071B33" stroke-width="4"/>
    <line x1="112" y1="126" x2="100" y2="113" stroke="#071B33" stroke-width="4"/>
    <text x="150" y="188" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0B2A45">Gale-Shapley + score</text>
    <text x="150" y="212" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">
      <tspan x="150" dy="0">Choix, competences</tspan>
      <tspan x="150" dy="17">et charge encadrant</tspan>
    </text>
  </g>

  <!-- Arrows -->
  <line x1="410" y1="340" x2="485" y2="340" stroke="#0B2A45" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="790" y1="340" x2="865" y2="340" stroke="#0B2A45" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="475" x2="640" y2="530" stroke="#0B2A45" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Database -->
  <g transform="translate(455 535)">
    <rect x="0" y="0" width="370" height="98" rx="18" fill="#F8FAFC" stroke="#D8E3ED" stroke-width="2"/>
    <ellipse cx="74" cy="27" rx="42" ry="16" fill="#0E7490"/>
    <rect x="32" y="27" width="84" height="34" fill="#0E7490"/>
    <ellipse cx="74" cy="61" rx="42" ry="16" fill="#0891B2"/>
    <text x="145" y="31" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#071B33">Base de donnees</text>
    <text x="145" y="56" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">
      <tspan x="145" dy="0">MySQL : utilisateurs, groupes, projets</tspan>
      <tspan x="145" dy="17">choix et affectations</tspan>
    </text>
  </g>

  <!-- Labels -->
  <g font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">
    <text x="450" y="320" text-anchor="middle">requêtes HTTP</text>
    <text x="830" y="320" text-anchor="middle">calcul d'affectation</text>
    <text x="660" y="512" text-anchor="start">SQLAlchemy</text>
  </g>
</svg>
